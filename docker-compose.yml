version: '3.8'

services:
  app:
    build: .
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://timetrack:password@db:5432/timetrack
      - PORT=3001
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=timetrack
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=timetrack
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
